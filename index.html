<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#2a78d6">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="KakeLog">
<title>KakeLog — 自動連携家計簿</title>
<style>
:root{
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --hairline:rgba(11,11,11,.10);
  --accent:#2a78d6; --accent-soft:rgba(42,120,214,.10);
  --good:#006300; --bad:#d03b3b;
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300;
  --s5:#4a3aa7; --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --fold:#a8a69e;
  --shadow:0 1px 2px rgba(11,11,11,.05),0 4px 16px rgba(11,11,11,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --surface-1:#1a1a19; --page:#0d0d0d;
    --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
    --grid:#2c2c2a; --axis:#383835; --hairline:rgba(255,255,255,.10);
    --accent:#3987e5; --accent-soft:rgba(57,135,229,.16);
    --good:#0ca30c; --bad:#e66767;
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300;
    --s5:#9085e9; --s6:#e66767; --s7:#d55181; --s8:#d95926;
    --fold:#6e6d67;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.35);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--page); color:var(--ink-1); font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
#app{display:flex;min-height:100%}

/* ---------- sidebar (desktop) ---------- */
#sidebar{
  display:none; width:220px; flex-shrink:0; position:sticky; top:0; height:100vh;
  padding:20px 12px; border-right:1px solid var(--hairline); background:var(--surface-1);
  flex-direction:column; gap:2px;
}
#sidebar .brand{display:flex;align-items:center;gap:10px;padding:8px 12px 22px;font-weight:800;font-size:18px;letter-spacing:.01em}
#sidebar .brand .logo{width:32px;height:32px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;font-size:16px}
.navbtn{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;
  color:var(--ink-2);font-weight:600;font-size:14.5px;text-align:left;width:100%;
}
.navbtn svg{width:20px;height:20px;flex-shrink:0}
.navbtn:hover{background:var(--accent-soft)}
.navbtn.active{background:var(--accent-soft);color:var(--accent)}
#sidebar .foot{margin-top:auto;padding:12px;font-size:11.5px;color:var(--ink-3)}

/* ---------- main ---------- */
#main{flex:1;min-width:0;max-width:960px;margin:0 auto;padding:16px 16px calc(84px + env(safe-area-inset-bottom));width:100%}
@media (min-width:900px){
  #sidebar{display:flex}
  #tabbar{display:none}
  #main{padding:28px 36px 48px}
}

/* ---------- bottom tab bar (mobile) ---------- */
#tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  display:flex;justify-content:space-around;
  background:var(--surface-1);border-top:1px solid var(--hairline);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  backdrop-filter:blur(12px);
}
#tabbar .navbtn{flex-direction:column;gap:3px;font-size:10px;padding:6px 10px;border-radius:10px;align-items:center;flex:1;max-width:88px}
#tabbar .navbtn svg{width:22px;height:22px}
@media (min-width:900px){#tabbar{display:none}}

/* ---------- common ---------- */
.pagehead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 0 16px}
.pagehead h1{font-size:21px;font-weight:800;letter-spacing:.01em}
.card{background:var(--surface-1);border:1px solid var(--hairline);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.card + .card{margin-top:14px}
.card h2{font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:12px;letter-spacing:.02em}
.muted{color:var(--ink-3)}
.num{font-variant-numeric:tabular-nums}
.pos{color:var(--good)} .neg{color:var(--bad)}

.monthnav{display:flex;align-items:center;gap:4px;background:var(--surface-1);border:1px solid var(--hairline);border-radius:12px;padding:2px}
.monthnav button{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);font-size:16px}
.monthnav button:hover{background:var(--accent-soft)}
.monthnav .label{font-weight:700;font-size:14px;min-width:96px;text-align:center}

/* KPI */
.kpirow{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
@media(min-width:640px){.kpirow{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--surface-1);border:1px solid var(--hairline);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .t{font-size:11.5px;font-weight:700;color:var(--ink-3);letter-spacing:.03em}
.kpi .v{font-size:22px;font-weight:800;margin-top:2px}
.kpi .d{font-size:11.5px;margin-top:2px;color:var(--ink-3)}

/* charts */
.chartwrap{position:relative}
#tooltip{
  position:fixed;z-index:90;pointer-events:none;display:none;
  background:var(--surface-1);border:1px solid var(--hairline);border-radius:10px;
  padding:7px 11px;font-size:12px;box-shadow:var(--shadow);white-space:nowrap;
}
#tooltip .tt-t{color:var(--ink-3);font-size:11px}
#tooltip .tt-v{font-weight:700}

/* category breakdown */
.stackbar{display:flex;height:26px;border-radius:8px;overflow:hidden;gap:2px;background:transparent;margin:4px 0 14px}
.stackbar div{min-width:3px}
.catlist{display:flex;flex-direction:column}
.catrow{display:flex;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--grid);font-size:14px}
.catrow:first-child{border-top:none}
.catrow .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.catrow .nm{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.catrow .pct{color:var(--ink-3);font-size:12px;width:44px;text-align:right}
.catrow .amt{font-weight:700;width:110px;text-align:right}

/* transaction list */
.txgroup{margin-bottom:4px}
.txdate{font-size:12px;font-weight:700;color:var(--ink-3);padding:12px 2px 6px;display:flex;justify-content:space-between}
.txrow{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;
  background:var(--surface-1);border:1px solid var(--hairline);margin-bottom:6px;
}
.txrow .ic{width:38px;height:38px;border-radius:11px;background:var(--accent-soft);display:grid;place-items:center;font-size:18px;flex-shrink:0}
.txrow .bd{flex:1;min-width:0}
.txrow .ds{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txrow .meta{display:flex;gap:6px;align-items:center;margin-top:2px}
.txrow .amt{font-weight:700;font-size:15px;white-space:nowrap}
.chip{
  font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;
  background:var(--accent-soft);color:var(--accent);border:none;
}
.srcbadge{font-size:10px;font-weight:600;color:var(--ink-3);border:1px solid var(--grid);border-radius:99px;padding:1px 7px}
.txrow .del{color:var(--ink-3);font-size:15px;padding:6px;border-radius:8px;opacity:.55}
.txrow .del:hover{background:var(--accent-soft);opacity:1}

/* filters */
.filterrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filterrow input[type=search],.filterrow select{
  background:var(--surface-1);border:1px solid var(--hairline);border-radius:10px;
  padding:8px 12px;font-size:13.5px;outline:none;color:var(--ink-1);
}
.filterrow input[type=search]{flex:1;min-width:140px}
.filterrow input:focus,.filterrow select:focus{border-color:var(--accent)}

/* buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#fff;font-weight:700;font-size:14px;
  border-radius:11px;padding:10px 18px;
}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--surface-1);color:var(--ink-1);border:1px solid var(--hairline)}
.btn.ghost:hover{background:var(--accent-soft);filter:none}
.btn.danger{background:transparent;color:var(--bad);border:1px solid var(--hairline)}
.btn.sm{padding:7px 13px;font-size:13px;border-radius:9px}

/* FAB */
#fab{
  position:fixed;right:18px;bottom:calc(78px + env(safe-area-inset-bottom));z-index:35;
  width:54px;height:54px;border-radius:18px;background:var(--accent);color:#fff;
  font-size:26px;display:grid;place-items:center;box-shadow:0 6px 20px rgba(42,120,214,.4);
}
@media(min-width:900px){#fab{bottom:28px;right:28px}}

/* import */
.dropzone{
  border:2px dashed var(--axis);border-radius:16px;padding:34px 18px;text-align:center;
  color:var(--ink-2);transition:.15s;cursor:pointer;background:var(--surface-1);
}
.dropzone.over{border-color:var(--accent);background:var(--accent-soft)}
.dropzone .big{font-size:34px;margin-bottom:6px}
.guide{display:flex;flex-direction:column;gap:0}
.guide details{border-top:1px solid var(--grid);padding:2px 0}
.guide details:first-child{border-top:none}
.guide summary{cursor:pointer;font-weight:700;font-size:14px;padding:11px 2px;display:flex;align-items:center;gap:10px;list-style:none}
.guide summary::-webkit-details-marker{display:none}
.guide summary .tag{margin-left:auto;font-size:10.5px;color:var(--ink-3);font-weight:600}
.guide ol{padding:0 2px 12px 22px;font-size:13.5px;color:var(--ink-2)}
.guide li{margin:3px 0}
.srcdot{width:10px;height:10px;border-radius:99px;flex-shrink:0}

/* assets */
.acctrow{display:flex;align-items:center;gap:12px;padding:13px 2px;border-top:1px solid var(--grid)}
.acctrow:first-child{border-top:none}
.acctrow .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;background:var(--accent-soft);flex-shrink:0}
.acctrow .bd{flex:1}
.acctrow .nm{font-weight:700;font-size:14.5px}
.acctrow .up{font-size:11px;color:var(--ink-3)}
.acctrow .bal{font-weight:700;font-size:16px}
.acctrow .edit{color:var(--accent);font-size:12.5px;font-weight:700;padding:6px 8px;border-radius:8px}
.acctrow .edit:hover{background:var(--accent-soft)}

/* settings */
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 2px;border-top:1px solid var(--grid)}
.setrow:first-child{border-top:none}
.rulerow{display:flex;align-items:center;gap:10px;padding:9px 2px;border-top:1px solid var(--grid);font-size:13.5px}
.rulerow:first-child{border-top:none}
.rulerow .kw{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* modal */
#modal-root{position:fixed;inset:0;z-index:80;display:none}
#modal-root.open{display:block}
.scrim{position:absolute;inset:0;background:rgba(11,11,11,.45)}
.sheet{
  position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;
  background:var(--surface-1);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  max-height:86vh;overflow:auto;
}
@media(min-width:640px){.sheet{bottom:auto;top:50%;transform:translate(-50%,-50%);border-radius:20px}}
.sheet h3{font-size:16px;font-weight:800;margin-bottom:14px}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:12px;font-weight:700;color:var(--ink-3);margin-bottom:5px}
.frow input,.frow select,.frow textarea{
  width:100%;background:var(--page);border:1px solid var(--hairline);border-radius:10px;
  padding:10px 12px;font-size:15px;outline:none;
}
.frow input:focus,.frow select:focus{border-color:var(--accent)}
.seg{display:flex;background:var(--page);border:1px solid var(--hairline);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;padding:8px;border-radius:8px;font-weight:700;font-size:14px;color:var(--ink-3)}
.seg button.on{background:var(--surface-1);color:var(--ink-1);box-shadow:var(--shadow)}
.catgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.catgrid button{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;
  border:1px solid var(--hairline);border-radius:12px;font-size:11.5px;font-weight:600;background:var(--page);
}
.catgrid button .e{font-size:20px}
.catgrid button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

/* toast */
#toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(86px + env(safe-area-inset-bottom));
  z-index:100;background:var(--ink-1);color:var(--page);padding:10px 18px;border-radius:12px;
  font-size:13.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;max-width:88vw;text-align:center;
}
@media(min-width:900px){#toast{bottom:36px}}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* empty state */
.empty{text-align:center;padding:44px 18px;color:var(--ink-3)}
.empty .big{font-size:42px;margin-bottom:10px}
.empty p{font-size:14px;margin-bottom:16px}

.notice{
  display:flex;gap:10px;align-items:flex-start;background:var(--accent-soft);
  border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ink-2);margin-bottom:14px;
}
svg .bar{cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>
<nav id="tabbar"></nav>
<button id="fab" title="記録を追加" onclick="openFabMenu()">＋</button>
<div id="modal-root"></div>
<div id="tooltip"></div>
<div id="toast"></div>
<input type="file" id="fileinput" accept=".csv,text/csv" multiple hidden>
<input type="file" id="jsoninput" accept=".json,application/json" hidden>
<input type="file" id="receiptinput" accept="image/*" hidden>
<input type="file" id="scaninput" accept="image/*" hidden>

<script>
'use strict';
/* =====================================================
   KakeLog v1 — 自動連携家計簿
   データはすべて localStorage に保存。外部送信なし。
===================================================== */
const LS_KEY = 'kakelog:v1';

/* ---------- カテゴリ定義 (dot = チャート用固定スロット) ---------- */
const CATS = [
  {id:'food',     name:'食費',       e:'🛒', slot:'--s1'},
  {id:'eatout',   name:'外食',       e:'🍜', slot:'--s2'},
  {id:'daily',    name:'日用品',     e:'🧴', slot:'--s3'},
  {id:'transport',name:'交通',       e:'🚃', slot:'--s4'},
  {id:'hobby',    name:'趣味・娯楽', e:'🎮', slot:'--s5'},
  {id:'util',     name:'水道光熱',   e:'💡', slot:'--s6'},
  {id:'comm',     name:'通信',       e:'📱', slot:'--s7'},
  {id:'house',    name:'住居',       e:'🏠', slot:'--s8'},
  {id:'clothes',  name:'衣服・美容', e:'👕', slot:'--fold'},
  {id:'health',   name:'健康・医療', e:'💪', slot:'--fold'},
  {id:'social',   name:'交際費',     e:'🎁', slot:'--fold'},
  {id:'invest',   name:'投資',       e:'📈', slot:'--fold'},
  {id:'other',    name:'その他',     e:'📦', slot:'--fold'},
  {id:'transfer', name:'振替',       e:'🔁', slot:'--fold'},  // 集計から除外
  {id:'income',   name:'収入',       e:'💰', slot:'--fold'},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.id,c]));
const EXPENSE_CATS = CATS.filter(c=>!['transfer','income'].includes(c.id));

const SOURCES = {
  'rakuten-card':{name:'楽天カード', e:'💳'},
  'rakuten-pay' :{name:'楽天Pay',   e:'📲'},
  'rakuten-bank':{name:'楽天銀行',   e:'🏦'},
  'rakuten-sec' :{name:'楽天証券',   e:'📈'},
  'paypay'      :{name:'PayPay',    e:'🅿️'},
  'cash'        :{name:'現金',       e:'💴'},
  'unknown'     :{name:'その他',     e:'🧾'},  // レシートスキャンで登録した経路未確定の支出
};

/* ---------- 自動分類の初期キーワードルール ---------- */
const DEFAULT_RULES = [
  {kw:'マルエツ',cat:'food'},{kw:'ライフ',cat:'food'},{kw:'イオン',cat:'food'},{kw:'西友',cat:'food'},
  {kw:'まいばすけっと',cat:'food'},{kw:'オーケー',cat:'food'},{kw:'サミット',cat:'food'},{kw:'業務スーパー',cat:'food'},
  {kw:'セブン-イレブン',cat:'food'},{kw:'セブンイレブン',cat:'food'},{kw:'ファミリーマート',cat:'food'},{kw:'ローソン',cat:'food'},
  {kw:'マクドナルド',cat:'eatout'},{kw:'スターバックス',cat:'eatout'},{kw:'すき家',cat:'eatout'},{kw:'松屋',cat:'eatout'},
  {kw:'吉野家',cat:'eatout'},{kw:'ガスト',cat:'eatout'},{kw:'サイゼリヤ',cat:'eatout'},{kw:'スシロー',cat:'eatout'},
  {kw:'くら寿司',cat:'eatout'},{kw:'ドトール',cat:'eatout'},{kw:'タリーズ',cat:'eatout'},{kw:'出前館',cat:'eatout'},{kw:'Uber',cat:'eatout'},
  {kw:'マツモトキヨシ',cat:'daily'},{kw:'ウエルシア',cat:'daily'},{kw:'スギ薬局',cat:'daily'},{kw:'ドン・キホーテ',cat:'daily'},
  {kw:'ニトリ',cat:'daily'},{kw:'無印良品',cat:'daily'},{kw:'ダイソー',cat:'daily'},{kw:'Amazon',cat:'daily'},{kw:'アマゾン',cat:'daily'},
  {kw:'JR',cat:'transport'},{kw:'メトロ',cat:'transport'},{kw:'モバイルスイカ',cat:'transport'},{kw:'モバイルSuica',cat:'transport'},
  {kw:'西武鉄道',cat:'transport'},{kw:'タクシー',cat:'transport'},{kw:'GO ',cat:'transport'},
  {kw:'Netflix',cat:'hobby'},{kw:'Spotify',cat:'hobby'},{kw:'YouTube',cat:'hobby'},{kw:'ニンテンドー',cat:'hobby'},
  {kw:'PlayStation',cat:'hobby'},{kw:'プレイステーション',cat:'hobby'},{kw:'Steam',cat:'hobby'},{kw:'Apple.com',cat:'hobby'},
  {kw:'東京電力',cat:'util'},{kw:'東京ガス',cat:'util'},{kw:'水道',cat:'util'},{kw:'電気',cat:'util'},
  {kw:'楽天モバイル',cat:'comm'},{kw:'ソフトバンク',cat:'comm'},{kw:'ドコモ',cat:'comm'},{kw:'ＫＤＤＩ',cat:'comm'},
  {kw:'家賃',cat:'house'},{kw:'管理費',cat:'house'},{kw:'ユニクロ',cat:'clothes'},{kw:'GU',cat:'clothes'},{kw:'ZOZO',cat:'clothes'},
  {kw:'ジム',cat:'health'},{kw:'エニタイム',cat:'health'},{kw:'ゴールドジム',cat:'health'},{kw:'薬局',cat:'daily'},
  {kw:'病院',cat:'health'},{kw:'クリニック',cat:'health'},{kw:'歯科',cat:'health'},
  {kw:'楽天証券',cat:'invest'},{kw:'投信',cat:'invest'},{kw:'積立',cat:'invest'},
  {kw:'給与',cat:'income'},{kw:'給料',cat:'income'},{kw:'賞与',cat:'income'},{kw:'ボーナス',cat:'income'},
  {kw:'チャージ',cat:'transfer'},{kw:'楽天カードサービス',cat:'transfer'},{kw:'カード引落',cat:'transfer'},
  {kw:'ATM',cat:'transfer'},{kw:'出金',cat:'transfer'},{kw:'振込',cat:'transfer'},
];

/* ---------- state ---------- */
let state = load();
function defaultState(){
  return {
    tx: [],
    accounts: [
      {id:'rakuten-bank', name:'楽天銀行',   e:'🏦', balance:null, updatedAt:null, auto:true},
      {id:'rakuten-sec',  name:'楽天証券',   e:'📈', balance:null, updatedAt:null},
      {id:'paypay',       name:'PayPay残高', e:'🅿️', balance:null, updatedAt:null},
      {id:'cash',         name:'現金',       e:'💴', balance:null, updatedAt:null},
    ],
    rules: [],           // 学習ルール {kw, cat}
    settings: {demoLoaded:false},
    gmail: {clientId:'', processedIds:[], lastSync:null, sinceDays:90, auto:true},
    drive: {enabled:false, fileId:null, lastBackup:null},
  };
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    const st = Object.assign(defaultState(), s);
    for(const t of st.tx){ delete t.receipt; }  // 旧バージョンの写真添付フラグを掃除
    return st;
  }catch(e){ return defaultState(); }
}

const $ = sel => document.querySelector(sel);
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const thisMonth = () => todayStr().slice(0,7);

function esc(s){ return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function yen(n){
  const sign = n<0 ? '−' : '';
  return sign + '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP');
}
function signedYen(n){ return (n>0?'+':'')+yen(n).replace('−','−'); }
function monthLabel(m){ const [y,mo]=m.split('-'); return `${y}年${+mo}月`; }
function shiftMonth(m, d){
  let [y,mo]=m.split('-').map(Number); mo+=d;
  while(mo<1){mo+=12;y--} while(mo>12){mo-=12;y++}
  return y+'-'+String(mo).padStart(2,'0');
}
function fmtDate(d){ const [y,m,dd]=d.split('-'); const w='日月火水木金土'[new Date(+y,+m-1,+dd).getDay()]; return `${+m}月${+dd}日(${w})`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function txHash(t){ return [t.date,t.amount,(t.desc||'').trim(),t.source].join('|'); }
/* メール取り込みとCSV取り込みの同一取引を検出するための緩い一致キー
   (店名表記がメールとCSVで異なるため、日付+金額+支払系統で照合する) */
function nearKey(t){
  const grp = (t.source==='rakuten-card'||t.source==='rakuten-pay'||t.source==='rakuten-sec') ? 'card' : t.source;
  return t.date+'|'+t.amount+'|'+grp;
}
function buildNearMap(txs){ const m=new Map(); for(const t of txs){ const k=nearKey(t); m.set(k,(m.get(k)||0)+1); } return m; }
function takeNear(map,t){ const k=nearKey(t); const c=map.get(k)||0; if(c>0){ map.set(k,c-1); return true; } return false; }
/* レシートスキャン由来の「経路未確定(unknown)」明細を、後から来たCSV/メールの同日・同額の明細と合体させる */
function buildUnknownIdx(){
  const m = new Map();
  for(const x of state.tx){
    if(x.source!=='unknown') continue;
    const k = x.date+'|'+x.amount;
    if(!m.has(k)) m.set(k, []);
    m.get(k).push(x);
  }
  return m;
}
function takeUnknown(map, t){
  const arr = map.get(t.date+'|'+t.amount);
  return (arr && arr.length) ? arr.shift() : null;
}
function toast(msg){
  const el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.remove('show'), 2600);
}
function slotColor(catId){
  return `var(${CAT[catId]?.slot || '--fold'})`;
}

/* ---------- 自動分類 ---------- */
function categorize(desc, source){
  const d = (desc||'').toLowerCase();
  // 学習ルール優先
  for(const r of state.rules){ if(d.includes(r.kw.toLowerCase())) return r.cat; }
  for(const r of DEFAULT_RULES){ if(d.includes(r.kw.toLowerCase())) return r.cat; }
  if(source==='rakuten-sec') return 'invest';
  return 'other';
}
function detectSourceRefine(desc, base){
  const d = desc||'';
  if(/楽天ペイ|楽天ﾍﾟｲ|楽天Ｐａｙ|楽天PAY/i.test(d)) return 'rakuten-pay';
  if(/楽天証券|ﾗｸﾃﾝｼｮｳｹﾝ/.test(d)) return 'rakuten-sec';
  return base;
}

/* =====================================================
   CSV 取り込み
===================================================== */
async function decodeFile(file){
  const buf = await file.arrayBuffer();
  const utf8 = new TextDecoder('utf-8',{fatal:false}).decode(buf);
  if(!utf8.includes('�')) return utf8;
  try{ return new TextDecoder('shift_jis').decode(buf); }catch(e){ return utf8; }
}
function parseCSV(text){
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell+=ch;
    }else{
      if(ch==='"') inQ=true;
      else if(ch===','){ row.push(cell); cell=''; }
      else if(ch==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(ch==='\r'){ /* skip */ }
      else cell+=ch;
    }
  }
  if(cell!=='' || row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
function normNum(s){
  if(s==null) return NaN;
  const t = String(s).replace(/[¥,\s円"]/g,'').replace(/[０-９．－]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  if(t===''||t==='-') return NaN;
  return Number(t);
}
function normDate(s){
  if(!s) return null;
  const t = String(s).trim().replace(/[年月]/g,'/').replace(/日/,'');
  let m = t.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = t.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
function findCol(header, ...names){
  return header.findIndex(h => names.some(n => h.replace(/\s|"/g,'').includes(n)));
}

/* フォーマット判定 → パース。 {name, txs:[{date,amount,desc,source}], balance?} を返す */
function parseStatement(rows){
  // ヘッダー行を先頭5行から探す
  for(let hi=0; hi<Math.min(rows.length,5); hi++){
    const h = rows[hi].map(c=>c.trim());
    const body = rows.slice(hi+1);

    // --- 楽天カード ---
    if(findCol(h,'利用日')>=0 && findCol(h,'利用店名','利用店名・商品名')>=0){
      const iDate=findCol(h,'利用日'), iDesc=findCol(h,'利用店名','利用店名・商品名');
      let iAmt=findCol(h,'利用金額'); if(iAmt<0) iAmt=findCol(h,'支払総額');
      const txs=[];
      for(const r of body){
        const date=normDate(r[iDate]); const amt=normNum(r[iAmt]);
        if(!date || isNaN(amt) || amt===0) continue;  // 分割調整行などをスキップ
        const desc=(r[iDesc]||'').trim();
        txs.push(mkTx(date, -amt, desc, detectSourceRefine(desc,'rakuten-card')));
      }
      return {name:'楽天カード', txs};
    }
    // --- 楽天銀行 ---
    if(findCol(h,'取引日')>=0 && findCol(h,'入出金')>=0 && findCol(h,'取引後残高')>=0){
      const iDate=findCol(h,'取引日'), iAmt=findCol(h,'入出金'), iBal=findCol(h,'取引後残高'),
            iDesc=findCol(h,'入出金内容','内容','摘要');
      const txs=[]; let latest=null;
      for(const r of body){
        const date=normDate(r[iDate]); const amt=normNum(r[iAmt]);
        if(!date || isNaN(amt)) continue;
        const desc=(r[iDesc]||'').trim();
        const bal=normNum(r[iBal]);
        if(!isNaN(bal) && (!latest || date>=latest.date)) latest={date, bal};
        txs.push(mkTx(date, amt, desc, detectSourceRefine(desc,'rakuten-bank')));
      }
      return {name:'楽天銀行', txs, balance:latest};
    }
    // --- PayPay ---
    if(findCol(h,'取引日')>=0 && (findCol(h,'出金金額')>=0 || findCol(h,'入金金額')>=0) && findCol(h,'取引先','取引内容')>=0){
      const iDate=findCol(h,'取引日'), iOut=findCol(h,'出金金額'), iIn=findCol(h,'入金金額'),
            iTo=findCol(h,'取引先'), iWhat=findCol(h,'取引内容'), iHow=findCol(h,'取引方法');
      const txs=[];
      for(const r of body){
        const date=normDate(r[iDate]); if(!date) continue;
        const out=normNum(r[iOut]), inc=normNum(r[iIn]);
        let amt = !isNaN(out)&&out>0 ? -out : (!isNaN(inc)&&inc>0 ? inc : NaN);
        if(isNaN(amt)) continue;
        let desc=(r[iTo]||'').trim() || (r[iWhat]||'').trim();
        const how=(r[iHow]||'')+(r[iWhat]||'');
        if(/チャージ/.test(how) || /チャージ/.test(desc)) { txs.push({...mkTx(date,amt,desc||'PayPayチャージ','paypay'), category:'transfer'}); continue; }
        txs.push(mkTx(date, amt, desc, 'paypay'));
      }
      return {name:'PayPay', txs};
    }
    // --- 汎用 (日付/金額/内容 が見つかれば) ---
    const iDate=findCol(h,'日付','date','Date','取引日','利用日');
    const iAmt=findCol(h,'金額','amount','Amount');
    if(iDate>=0 && iAmt>=0){
      const iDesc=findCol(h,'内容','摘要','説明','description','店名','メモ');
      const txs=[];
      for(const r of body){
        const date=normDate(r[iDate]); const amt=normNum(r[iAmt]);
        if(!date||isNaN(amt)||amt===0) continue;
        txs.push(mkTx(date, amt, iDesc>=0?(r[iDesc]||'').trim():'', 'cash'));
      }
      return {name:'汎用CSV', txs};
    }
  }
  return null;
}
function mkTx(date, amount, desc, source, via){
  const t = {id:uid(), date, amount:Math.round(amount), desc, source, category:null, via:via||'csv'};
  t.category = categorize(desc, source);
  if(t.category!=='income' && amount>0 && source!=='cash' && t.category==='other') t.category='income';
  t.hash = txHash(t);
  return t;
}

async function importFiles(files){
  const existing = new Set(state.tx.map(txHash));
  const nearMail = buildNearMap(state.tx.filter(t=>t.via==='mail'));
  const unknownIdx = buildUnknownIdx();
  let added=0, dup=0, merged=0, balMsg='';
  const perSource={};
  for(const f of files){
    let parsed;
    try{
      const text = await decodeFile(f);
      parsed = parseStatement(parseCSV(text));
    }catch(e){ parsed=null; }
    if(!parsed){ toast(`「${f.name}」の形式を認識できませんでした`); continue; }
    for(const t of parsed.txs){
      if(existing.has(t.hash)){ dup++; continue; }
      if(takeNear(nearMail, t)){ dup++; continue; }  // メール取り込み済みの同一取引
      const ux = takeUnknown(unknownIdx, t);
      if(ux){ ux.source=t.source; ux.via=t.via; existing.add(t.hash); merged++; continue; }  // レシート登録済みの支出と合体
      existing.add(t.hash);
      state.tx.push(t); added++;
      perSource[parsed.name]=(perSource[parsed.name]||0)+1;
    }
    if(parsed.balance){
      const acct = state.accounts.find(a=>a.id==='rakuten-bank');
      if(acct && (!acct.updatedAt || parsed.balance.date >= acct.updatedAt)){
        acct.balance = parsed.balance.bal;
        acct.updatedAt = parsed.balance.date;
        balMsg = ` / 楽天銀行残高を${yen(parsed.balance.bal)}に更新`;
      }
    }
  }
  state.tx.sort((a,b)=> b.date.localeCompare(a.date));
  save(); render();
  const detail = Object.entries(perSource).map(([k,v])=>`${k} ${v}件`).join('、');
  const mergeMsg = merged ? ` / レシート登録済み${merged}件と合体` : '';
  toast(added
    ? `${added}件を取り込みました(${detail})${dup?` / 重複${dup}件はスキップ`:''}${mergeMsg}${balMsg}`
    : (dup||merged ? `新規はありませんでした(重複${dup}件${mergeMsg})` : '取り込める明細がありませんでした'));
}

/* =====================================================
   集計
===================================================== */
function txOfMonth(m){ return state.tx.filter(t=>t.date.startsWith(m)); }
function isExpense(t){ return t.amount<0 && t.category!=='transfer'; }
function isIncome(t){ return t.amount>0 && t.category!=='transfer'; }
function monthStats(m){
  const txs = txOfMonth(m);
  let exp=0, inc=0;
  const byCat={}, byDay={}, bySrc={};
  for(const t of txs){
    if(isExpense(t)){
      exp += -t.amount;
      byCat[t.category]=(byCat[t.category]||0)+(-t.amount);
      byDay[t.date]=(byDay[t.date]||0)+(-t.amount);
      bySrc[t.source]=(bySrc[t.source]||0)+(-t.amount);
    }else if(isIncome(t)){
      inc += t.amount;
    }
  }
  return {exp, inc, byCat, byDay, bySrc, count:txs.length};
}

/* 日別column chart (単一シリーズ=sequential blue) */
function dailyChartSVG(byDay){
  const [y,m]=viewMonth.split('-').map(Number);
  const days = new Date(y, m, 0).getDate();
  const vals = Array.from({length:days},(_,i)=> byDay[`${viewMonth}-${String(i+1).padStart(2,'0')}`]||0);
  const max = Math.max(...vals, 1);
  const W=680, H=170, padL=8, padR=8, padT=18, padB=22;
  const iw=(W-padL-padR)/days;
  const bw=Math.min(iw*0.66, 16);
  const bars = vals.map((v,i)=>{
    const x=padL+i*iw+(iw-bw)/2;
    const h=v? Math.max((H-padT-padB)*v/max, 2):0;
    const yy=H-padB-h;
    const date=`${viewMonth}-${String(i+1).padStart(2,'0')}`;
    return v?`<rect class="bar" x="${x.toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="4" ry="4"
      fill="var(--accent)" data-tt-t="${fmtDate(date)}" data-tt-v="${yen(v)}"/>`:'';
  }).join('');
  // grid: max/2 と max
  const gy1=H-padB-(H-padT-padB)/2, gy2=padT;
  const ticks = [1, Math.ceil(days/2), days].map(d=>{
    const x=padL+(d-1)*iw+iw/2;
    return `<text x="${x}" y="${H-6}" font-size="10" fill="var(--ink-3)" text-anchor="middle">${d}日</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" role="img" aria-label="日別支出グラフ">
    <line x1="${padL}" x2="${W-padR}" y1="${gy2}" y2="${gy2}" stroke="var(--grid)" stroke-width="1"/>
    <line x1="${padL}" x2="${W-padR}" y1="${gy1}" y2="${gy1}" stroke="var(--grid)" stroke-width="1"/>
    <line x1="${padL}" x2="${W-padR}" y1="${H-padB}" y2="${H-padB}" stroke="var(--axis)" stroke-width="1"/>
    <text x="${W-padR}" y="${gy2-5}" font-size="10" fill="var(--ink-3)" text-anchor="end">${yen(max)}</text>
    ${bars}${ticks}
  </svg>`;
}

function categoryBreakdownHTML(s){
  const entries = Object.entries(s.byCat).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return '<div class="muted" style="font-size:13px">この月の支出はありません</div>';
  const total = entries.reduce((a,[,v])=>a+v,0);
  // 上位7 + その他fold (色はカテゴリ固有スロット / foldは灰色)
  const segs = entries.map(([cat,v])=>({cat,v,color:slotColor(cat)}));
  const bar = segs.map(sg=>`<div style="flex:${sg.v};background:${sg.color}" title="${esc(CAT[sg.cat]?.name)} ${yen(sg.v)}"></div>`).join('');
  const rows = entries.map(([cat,v])=>`
    <div class="catrow">
      <span class="dot" style="background:${slotColor(cat)}"></span>
      <span class="nm">${CAT[cat]?.e||''} ${esc(CAT[cat]?.name||cat)}</span>

/* 方針: レシート写真は保存しない(容量節約)。読み取りに使ったら破棄し、テキストだけをメモに残す */
try{ indexedDB.deleteDatabase('kakelog'); }catch(e){}  // 旧バージョンが保存した写真を削除して容量を回収
function resizeImage(file){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX=1600;
      const s = Math.min(1, MAX/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      c.toBlob(b=> b?res(b):rej(new Error('画像を変換できませんでした')), 'image/jpeg', 0.82);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = ()=>rej(new Error('画像を読み込めませんでした'));
    img.src = URL.createObjectURL(file);
  });
}

/* レシートOCR: 画像を自分のDriveへGoogleドキュメントとして一時アップロード(=Googleが文字起こし)
   → テキストをエクスポート → 一時ファイルを削除。テキストを返す */
async function driveOcr(blob){
  if(!_gmailToken) await gmailAuth();
  const b64 = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(String(r.result).split(',')[1]);
    r.onerror = ()=>rej(new Error('画像の読み込みに失敗しました'));
    r.readAsDataURL(blob);
  });
  const boundary = 'kakelogocr';
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
    JSON.stringify({name:'kakelog-ocr-temp', mimeType:'application/vnd.google-apps.document'})+
    `\r\n--${boundary}\r\nContent-Type: image/jpeg\r\nContent-Transfer-Encoding: base64\r\n\r\n`+b64+`\r\n--${boundary}--`;
  const up = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&ocrLanguage=ja', {
    method:'POST', headers:{Authorization:'Bearer '+_gmailToken, 'Content-Type':'multipart/related; boundary='+boundary}, body});
  if(!up.ok) throw new Error('Drive APIエラー('+up.status+')'+(up.status===403?' — 設定画面の案内に沿ってGoogle Drive APIを有効化してください':''));
  const f = await up.json();
  try{
    const ex = await fetch('https://www.googleapis.com/drive/v3/files/'+f.id+'/export?mimeType=text/plain', {headers:{Authorization:'Bearer '+_gmailToken}});
    if(!ex.ok) throw new Error('テキスト変換エラー('+ex.status+')');
    const text = (await ex.text()).replace(/^﻿/,'').replace(/\r/g,'').replace(/\n{3,}/g,'\n\n').trim();
    if(!text) throw new Error('文字を読み取れませんでした(写真の明るさ・角度を変えてお試しください)');
    return text;
  }finally{
    // 一時ファイルを削除(失敗しても本処理には影響させない)
    fetch('https://www.googleapis.com/drive/v3/files/'+f.id, {method:'DELETE', headers:{Authorization:'Bearer '+_gmailToken}}).catch(()=>{});
  }
}
/* OCR全文から「店名・商品名+金額・合計」だけを残す(容量節約・ノイズ除去) */
function cleanReceiptText(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const NG = /電話|TEL|FAX|℡|レジ|担当|係:|No[.:：]|NO[.:：]|取引|会員|カード番号|ポイント|point|お預り|お預かり|預り|お?釣り?|クレジット|支払|税率|対象額?|軽減|バーコード|http|www|ありがとう|またの|お越し|営業時間|住所|〒|登録番号|T\d{10,}|残高|チャージ|承認|伝票|端末|区分|発行|控え|\d+-\d+/i;
  const out = [];
  const store = lines[0] && !NG.test(lines[0]) ? lines[0] : '';
  if(store) out.push(store);
  for(const l of lines.slice(1)){
    if(NG.test(l)) continue;
    const m = l.match(/^(.{1,30}?)[\s　]*[¥￥]?([0-9][0-9,]{0,9})(?:円)?$/);
    if(!m) continue;
    const name = m[1].replace(/[*＊※◆■]/g,'').trim();
    const price = normNum(m[2]);
    if(!name || /^[\d\s,.:\/-]+$/.test(name) || isNaN(price) || price<=0 || price>=1000000) continue;
    if(/小計|外税|内税|消費税|値引|割引/.test(name)) continue;
    if(/合計|買上/.test(name)){ out.push(`合計 ${price.toLocaleString('ja-JP')}円`); continue; }
    out.push(`${name} ${price.toLocaleString('ja-JP')}円`);
  }
  // 品目が拾えなかった場合は、ノイズ行だけ除いた全文を残す(何も無いよりまし)
  return out.length>1 ? out.join('\n') : lines.filter(l=>!NG.test(l)).join('\n');
}

/* =====================================================
   レシートスキャン: 撮影→OCR→合計金額・日付で明細を自動照合→紐付け
===================================================== */
let _pendingScan = null;

async function scanReceipt(file){
  toast('レシートを読み取っています…');
  try{
    const blob = await resizeImage(file);   // 縮小してアップロード(通信量節約)。写真自体は保存しない
    const raw = await driveOcr(blob);
    const info = parseReceiptText(raw);
    const text = cleanReceiptText(raw);
    _pendingScan = {text, info};
    const cands = matchReceiptTx(info);
    if(cands.length===1){
      const id = cands[0].id;
      _pendingScan = null;
      applyReceipt(id, text);
      toast(`「${(cands[0].desc||'明細').slice(0,12)}」に自動で紐付けました`);
      openTxDetail(id);
    }else{
      openReceiptMatchModal(cands);
    }
  }catch(e){ toast('スキャン失敗: '+e.message); }
}
/* OCRテキストから合計金額・日付・店名を推定 */
function parseReceiptText(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  let amt = null;
  for(const l of lines){
    if(/小計|お預り|お預かり|釣|ポイント|残高|値引/.test(l)) continue;
    const m = l.match(/(?:合計|お買上げ?計|ご?請求|クレジット|計)\D{0,8}?[¥￥]?\s*([0-9][0-9,]*)/);
    if(m){ const n = normNum(m[1]); if(!isNaN(n) && n>0){ amt = n; if(/合計/.test(l)) break; } }
  }
  if(amt==null){
    let mx = NaN;
    for(const m of text.matchAll(/[¥￥]\s*([0-9][0-9,]*)/g)){ const n=normNum(m[1]); if(!isNaN(n) && (isNaN(mx)||n>mx)) mx=n; }
    amt = isNaN(mx) ? null : mx;
  }
  const dm = text.match(/(20\d{2})[年\/\-.](\d{1,2})[月\/\-.](\d{1,2})/);
  const date = dm ? `${dm[1]}-${String(+dm[2]).padStart(2,'0')}-${String(+dm[3]).padStart(2,'0')}` : null;
  return {amt, date, store: lines[0]||''};
}
/* 同額の支出明細を探す(日付が近いものを優先) */
function matchReceiptTx({amt, date}){
  if(!amt) return [];
  const c = state.tx.filter(t=> t.amount===-amt && t.category!=='transfer');
  if(!c.length) return [];
  if(date){
    const exact = c.filter(t=>t.date===date); if(exact.length) return exact;
    const near = c.filter(t=>Math.abs(new Date(t.date)-new Date(date))<=3*864e5); if(near.length) return near;
  }
  return c;
}
function applyReceipt(id, text){
  const t = state.tx.find(x=>x.id===id); if(!t) return;
  t.memo = (t.memo ? t.memo+'\n\n' : '') + text.trim();
  save(); render();
}

    <div style="margin-top:10px"><button class="btn ghost" style="width:100%" onclick="_pendingScan=null;closeModal()">キャンセル</button></div>`);
}

    category: txForm.type==='inc' ? (txForm.cat==='other'?'other':'income') : txForm.cat,
  };
  t.hash = txHash(t);
  state.tx.push(t);
  state.tx.sort((a,b)=> b.date.localeCompare(a.date));
  save(); closeModal(); render(); toast('記録しました');
}

function loadGIS(){
  return new Promise((res,rej)=>{
    if(window.google?.accounts?.oauth2) return res();
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>res();
    s.onerror=()=>rej(new Error('Google認証スクリプトを読み込めません(オフライン?)'));
    document.head.appendChild(s);
  });
}
function gmailAuth(){
  return new Promise((res,rej)=>{
    loadGIS().then(()=>{
      try{
        const tc = google.accounts.oauth2.initTokenClient({
          client_id: state.gmail.clientId.trim(),
          scope: OAUTH_SCOPE,
          callback: t=>{ if(t && t.access_token){ _gmailToken=t.access_token; res(); } else rej(new Error('アクセス許可を取得できませんでした')); },
          error_callback: e=>{
            const t=e && e.type;
            rej(new Error(t==='popup_closed' ? '認証がキャンセルされました'
              : t==='popup_failed_to_open' ? 'ポップアップがブロックされました。もう一度ボタンを押してください'
              : '認証エラー('+(t||'不明')+')'));
          },
        });
        tc.requestAccessToken({prompt:''});
      }catch(err){ rej(err); }
    }).catch(rej);
  });
}
async function gmailApi(path, params){
  const url = new URL('https://gmail.googleapis.com/gmail/v1/users/me/'+path);
  for(const [k,v] of Object.entries(params||{})) url.searchParams.set(k,v);
  const r = await fetch(url, {headers:{Authorization:'Bearer '+_gmailToken}});
  if(r.status===401){ _gmailToken=null; throw new Error('認証の有効期限が切れました。もう一度同期してください'); }
  if(r.status===403) throw new Error('Gmail APIが有効化されていないか、権限がありません(403)');
  if(!r.ok) throw new Error('Gmail APIエラー('+r.status+')');
  return r.json();
}
/* メール本文をテキストで取り出す(text/plain優先、なければHTMLをタグ除去)。
   日本語メールは ISO-2022-JP / Shift_JIS が多いため、charsetヘッダーと文字化け検出で自動判定する */
function decodeMailBytes(b64url, charsetHint){
  let bytes;
  try{
    const bin = atob(b64url.replace(/-/g,'+').replace(/_/g,'/'));
    bytes = Uint8Array.from(bin, c=>c.charCodeAt(0));
  }catch(e){ return ''; }
  const encs = [];
  if(charsetHint) encs.push(charsetHint.toLowerCase());
  encs.push('utf-8','iso-2022-jp','shift_jis','euc-jp');
  let best='', bestScore=Infinity;
  for(const enc of [...new Set(encs)]){
    let t; try{ t = new TextDecoder(enc,{fatal:false}).decode(bytes); }catch(e){ continue; }
    // 置換文字(�)とエスケープ残り(ISO-2022-JPをUTF-8で読んだ痕跡)が少ないものを採用
    const bad = (t.match(/�/g)||[]).length + (t.includes('\u001b')?1000:0);
    if(bad===0) return t;
    if(bad<bestScore){ best=t; bestScore=bad; }
  }
  return best;
}
function partCharset(p){
  const ct = (p.headers||[]).find(h=>h.name.toLowerCase()==='content-type');
  const m = ct && ct.value.match(/charset="?([\w.-]+)"?/i);
  return m ? m[1] : null;
}
function mailBody(msg){
  const parts=[];
  (function walk(p){ if(!p) return; if(p.parts) p.parts.forEach(walk); else if(p.body && p.body.data) parts.push({mime:p.mimeType||'', data:p.body.data, cs:partCharset(p)}); })(msg.payload);
  const dec = p => decodeMailBytes(p.data, p.cs);
  // text/plain と text/html の両方を読む(HTMLメールに飾りのplainパートが同梱されるケースがあるため)
  const plain = parts.filter(p=>p.mime.startsWith('text/plain')).map(dec).join('\n');
  let html = parts.filter(p=>p.mime.startsWith('text/html')).map(dec).join('\n');
  if(html){
    html = html
      .replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<script[\s\S]*?<\/script>/gi,'')
      .replace(/<br\s*\/?>/gi,'\n').replace(/<\/(p|div|tr|li|td|th|h\d)>/gi,'\n')
      .replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&yen;/g,'¥')
      .replace(/&#(\d+);/g,(_,n)=>String.fromCodePoint(+n))
      .split('\n').map(l=>l.trim()).join('\n');
  }
  return (plain + '\n' + html).trim();
}
/* 楽天カード利用お知らせメール: 「利用日/利用先/利用金額」ブロックを抽出(1通に複数件あり得る) */
function parseCardMail(text){
  const txs=[]; let cur={};
  const flush=()=>{
    if(cur.date && cur.amt>0){
      const desc=cur.desc||'楽天カード利用';
      txs.push(mkTx(cur.date, -cur.amt, desc, detectSourceRefine(desc,'rakuten-card'), 'mail'));
    }
    cur={};
  };
  for(const raw of text.split('\n')){
    const line = raw.replace(/[■●▼◆□【】\*]/g,'').trim();
    let m;
    if((m=line.match(/^(?:ご)?利用日(?:時)?\s*[:：]\s*(.+)$/))){ if(cur.date && cur.amt) flush(); cur.date=normDate(m[1]); continue; }
    if((m=line.match(/^(?:ご)?利用(?:先|店舗名?|店名)\s*[:：]\s*(.+)$/))){ cur.desc=m[1].trim(); continue; }
    if((m=line.match(/^(?:ご)?利用金額\s*[:：]\s*([0-9,，]+)\s*円/))){ cur.amt=normNum(m[1]); flush(); continue; }
  }
  flush();
  return txs;
}
/* 楽天ペイ「お支払い完了のお知らせ」: ラベル行の次の行に値が来るHTMLメール。
   決済はのちに楽天カード明細にも「楽天ペイ ○○」として載るため、nearKeyで二重計上を排除する */
function parsePayMail(text, fallbackDate){
  const lines = text.split('\n').map(l=>l.trim());
  let store='', date=null, amt=NaN;
  const nextVal = i=>{ for(let j=i+1;j<lines.length;j++){ if(lines[j]) return lines[j]; } return ''; };
  for(let i=0;i<lines.length;i++){
    const l = lines[i];
    if(/^ご利用店舗/.test(l)){ store = l.replace(/^ご利用店舗\s*[:：]?\s*/,'') || nextVal(i); }
    else if(/^ご利用日時/.test(l)){ const v = l.replace(/^ご利用日時\s*[:：]?\s*/,'') || nextVal(i); date = normDate(v) || date; }
    else if(/^(決済総額|ご利用金額|お支払い?金額)/.test(l)){
      const v = (l.replace(/^(決済総額|ご利用金額|お支払い?金額)\s*[:：]?\s*/,'') || nextVal(i)).replace(/[¥￥]/g,'');
      const n = normNum(v);
      if(!isNaN(n) && n>0) amt = n;
    }
  }
  if(!date) date = fallbackDate;
  if(!date || isNaN(amt) || amt<=0) return [];
  return [mkTx(date, -amt, store||'楽天ペイ', 'rakuten-pay', 'mail')];
}
/* 楽天銀行 入出金お知らせメール: 金額+方向(入金/出金)+内容を抽出 */
function parseBankMail(text, subject, fallbackDate){
  const all = subject+'\n'+text;
  let m = all.match(/(?:お?取引|ご?入金|ご?出金|お?振込)金額\s*[:：]?\s*([0-9,，]+)\s*円/);
  if(!m) m = all.match(/金額\s*[:：]\s*([0-9,，]+)\s*円/);
  if(!m) m = all.match(/([0-9]{1,3}(?:,[0-9]{3})+)\s*円/);
  const amt = m ? normNum(m[1]) : NaN;
  if(isNaN(amt) || amt<=0) return [];
  const dm = all.match(/(?:取引日時?|お?取引日|日時|日付)\s*[:：]?\s*([0-9]{4}[\/\-年][0-9]{1,2}[\/\-月][0-9]{1,2}日?)/);
  const date = dm ? normDate(dm[1]) : fallbackDate;
  if(!date) return [];
  const out = /出金|引き?落と?し|お支払/.test(subject) || /出金額|出金がありました/.test(text);
  const inn = /入金/.test(subject) || /入金額|入金がありました/.test(text);
  if(!out && !inn) return [];
  const cm = all.match(/^[\s■●]*(?:お?取引内容|ご?内容|摘要|振込依頼人名?|お?振込人)\s*[:：]\s*(.+)$/m);
  let desc = cm ? cm[1].trim() : subject.replace(/【楽天銀行】|\[楽天銀行\]|楽天銀行/g,'').trim();
  const sign = out && !inn ? -1 : (inn && !out ? 1 : (/出金/.test(subject)?-1:1));
  return [mkTx(date, sign*amt, desc, detectSourceRefine(desc,'rakuten-bank'), 'mail')];
}

  try{
    if(!_gmailToken) await gmailAuth();
    const processed = new Set(g.processedIds||[]);
    const hashes = new Set(state.tx.map(txHash));
    /* 照合対象: CSV/手動の全取引 + メール由来の楽天ペイ取引
       (ペイのメールとカードの通知/CSVは同じ決済を別表記で持ってくるため) */
    const nearOther = buildNearMap(state.tx.filter(t=>t.via!=='mail' || t.source==='rakuten-pay'));
    const unknownIdx = buildUnknownIdx();
    let added=0, dup=0, merged=0, scanned=0, unparsed=0, totalIds=0;
    for(const def of MAIL_DEFS){
      let pageToken=null; const ids=[];
      do{
        const p = {q:def.q+' newer_than:'+(g.sinceDays||90)+'d', maxResults:'100'};
        if(pageToken) p.pageToken=pageToken;
        const res = await gmailApi('messages', p);
        for(const mm of (res.messages||[])) ids.push(mm.id);
        pageToken = res.nextPageToken;
      }while(pageToken && ids.length<400);
      totalIds += ids.length;
      for(const id of ids){
        if(processed.has(id)) continue;
        const msg = await gmailApi('messages/'+id, {format:'full'});
        scanned++;
        const headers = Object.fromEntries((msg.payload && msg.payload.headers || []).map(h=>[h.name.toLowerCase(), h.value]));
        const fb = msg.internalDate ? new Date(+msg.internalDate).toLocaleDateString('sv-SE') : null;
        const body = mailBody(msg);
        let txs=[];
        try{ txs = def.parse(body, headers['subject']||'', fb); }catch(e){ txs=[]; }
        if(!txs.length){
          if(def.id!=='bank' && _lastFailures.length<10){
            _lastFailures.push({label:def.label, subject:headers['subject']||'(件名なし)', snippet:(body||'(本文なし)').slice(0,500)});
          }
          unparsed++;
          // 楽天銀行のメールは金額非記載のため明細化できない → CSV取り込みのリマインドに使う
          if(def.id==='bank' && fb && (!g.bankNotice || fb >= g.bankNotice.last)){
            g.bankNotice = {last:fb, count:((g.bankNotice&&g.bankNotice.count)||0)+1};
          }
        }
        for(const t of txs){
          if(hashes.has(t.hash)){ dup++; continue; }
          if(takeNear(nearOther, t)){ dup++; continue; }  // CSV取り込み済みの同一取引
          const ux = takeUnknown(unknownIdx, t);
          if(ux){ ux.source=t.source; ux.via=t.via; hashes.add(t.hash); merged++; continue; }  // レシート登録済みの支出と合体
          hashes.add(t.hash);
          state.tx.push(t); added++;
          // 同一同期内でペイ→カードの順に同じ決済が来ても照合できるよう、追加分も照合対象に足す
          if(t.source==='rakuten-pay'){ const k=nearKey(t); nearOther.set(k,(nearOther.get(k)||0)+1); }
        }
        processed.add(id);
      }
    }
    g.processedIds = [...processed].slice(-3000);
    g.lastSync = new Date().toISOString();
    state.tx.sort((a,b)=> b.date.localeCompare(a.date));
    save(); render();
    const mergeMsg = merged ? ` / レシート登録済み${merged}件と合体` : '';
    toast(added
      ? `メールから${added}件を取り込みました${dup?`(重複${dup}件はスキップ)`:''}${mergeMsg}`
      : (totalIds ? `新しい明細はありませんでした${unparsed?`(解析不能${unparsed}通)`:''}${mergeMsg}`
                  : '対象メールが見つかりませんでした。各サービスの通知メール設定を確認してください'));
  }catch(e){
    if(!silent) toast('同期に失敗: '+e.message);
  }finally{
    _syncing=false; setSyncBusy(false);
    if(page==='import') render();
  }
}

/* =====================================================
   Google Drive 自動バックアップ (drive.file スコープ)
   データJSONを Drive の kakelog-backup.json に保存する。
   レシート写真(IndexedDB)は含まれない。
===================================================== */
let _bkTimer = null, _inBackup = false;
function scheduleBackup(){
  // 保存のたびに呼ばれる。連打を避けるため20秒デバウンス。トークンがある時だけ自動実行
  if(_inBackup || !state.drive || !state.drive.enabled || !_gmailToken) return;
  clearTimeout(_bkTimer);
  _bkTimer = setTimeout(()=>driveBackupNow(true), 20000);
}
async function driveApiFindBackup(){
  const q = encodeURIComponent("name='kakelog-backup.json' and trashed=false");
  const r = await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,modifiedTime)', {headers:{Authorization:'Bearer '+_gmailToken}});
  if(!r.ok) throw new Error('Drive APIエラー('+r.status+')'+(r.status===403?' — Google Cloudで「Google Drive API」を有効化してください':''));
  const j = await r.json();
  return (j.files && j.files[0]) || null;
}
async function driveBackupNow(auto){
  if(_inBackup) return;
  if(!state.drive.enabled){ if(!auto) toast('先にDriveバックアップをONにしてください'); return; }
  _inBackup = true;
  const btn = $('#drive-bk-btn'); if(btn){ btn.disabled=true; btn.textContent='保存中…'; }
  try{
    if(!_gmailToken){ if(auto){ _inBackup=false; return; } await gmailAuth(); }
    const content = JSON.stringify(state);
    if(!state.drive.fileId){
      const found = await driveApiFindBackup();
      if(found) state.drive.fileId = found.id;
    }
    if(state.drive.fileId){
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files/'+state.drive.fileId+'?uploadType=media', {
        method:'PATCH', headers:{Authorization:'Bearer '+_gmailToken, 'Content-Type':'application/json'}, body:content});
      if(r.status===404){ state.drive.fileId=null; _inBackup=false; return driveBackupNow(auto); }
      if(!r.ok) throw new Error('Drive APIエラー('+r.status+')');
    }else{
      const boundary = 'kakelogboundary';
      const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
        JSON.stringify({name:'kakelog-backup.json', mimeType:'application/json'})+
        `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`+content+`\r\n--${boundary}--`;
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method:'POST', headers:{Authorization:'Bearer '+_gmailToken, 'Content-Type':'multipart/related; boundary='+boundary}, body});
      if(!r.ok) throw new Error('Drive APIエラー('+r.status+')'+(r.status===403?' — Google Cloudで「Google Drive API」を有効化してください':''));
      const j = await r.json();
      state.drive.fileId = j.id;
    }
    state.drive.lastBackup = new Date().toISOString();
    save();
    if(!auto) toast('Google Driveにバックアップしました');
    if(page==='settings') render();
  }catch(e){
    if(!auto) toast('バックアップ失敗: '+e.message);
  }finally{
    _inBackup = false;
    const b = $('#drive-bk-btn'); if(b){ b.disabled=false; b.textContent='今すぐバックアップ'; }
  }
}
async function driveRestore(){
  if(!confirm('Google Drive上のバックアップで、この端末のデータを上書きしますか?')) return;
  try{
    if(!_gmailToken) await gmailAuth();
    let fid = state.drive.fileId;
    if(!fid){ const found = await driveApiFindBackup(); if(!found){ toast('Drive上にバックアップが見つかりません'); return; } fid = found.id; }
    const r = await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media', {headers:{Authorization:'Bearer '+_gmailToken}});
    if(!r.ok) throw new Error('Drive APIエラー('+r.status+')');
    const s = await r.json();
    if(!Array.isArray(s.tx)) throw new Error('バックアップの形式が不正です');
    const keep = {enabled:true, fileId:fid, lastBackup:state.drive.lastBackup};
    state = Object.assign(defaultState(), s);
    state.drive = Object.assign({}, state.drive, keep);
    save(); render();
    toast(`Driveから復元しました(明細${state.tx.length}件)`);
  }catch(e){ toast('復元に失敗: '+e.message); }
}
function toggleDrive(on){
  state.drive.enabled = !!on;

function loadDemo(){

  const months=[shiftMonth(thisMonth(),-2), shiftMonth(thisMonth(),-1), thisMonth()];
  const today=todayStr();
  let seed=7; const rnd=()=>{ seed=(seed*16807)%2147483647; return seed/2147483647; };
  const groceries=['マルエツ ネリマ','まいばすけっと 練馬駅前','ライフ 練馬店','業務スーパー 練馬'];
  const conbini=['セブン-イレブン 練馬','ファミリーマート 練馬','ローソン 桜台'];
  const eats=['スシロー 練馬店','サイゼリヤ 練馬','スターバックス','松屋 練馬','出前館','ガスト 練馬','くら寿司'];
  const pp=['ドン・キホーテ 練馬','ウエルシア','ダイソー','マツモトキヨシ','ラーメン一蘭','ミスタードーナツ'];
  for(const m of months){

    const days=new Date(y,mo,0).getDate();
    const last = m===thisMonth() ? Number(today.slice(8)) : days;
    // 固定費 (カード)
    if(last>=1) push(`${m}-01`,-33333,'楽天証券 投信積立','rakuten-card');
    if(last>=3) push(`${m}-03`,-3278,'楽天モバイル','rakuten-card');
    if(last>=5) push(`${m}-05`,-1490,'Netflix','rakuten-card');
    if(last>=8) push(`${m}-08`,-980,'YouTube Premium','rakuten-card');
    if(last>=10) push(`${m}-10`,-8140,'東京電力','rakuten-card');
    if(last>=12) push(`${m}-12`,-4520,'東京ガス','rakuten-card');
    if(last>=15) push(`${m}-15`,-7980,'エニタイムフィットネス','rakuten-card');

    if(last>=25) push(`${m}-25`,262000,'給与 カ)カブシキガイシャ','rakuten-bank');

    for(let d=1;d<=last;d++){

      if(d%2===1) push(date, -Math.round(900+rnd()*2400), groceries[Math.floor(rnd()*groceries.length)], 'rakuten-pay');
      if(rnd()<0.35) push(date, -Math.round(300+rnd()*700), conbini[Math.floor(rnd()*conbini.length)], 'rakuten-pay');
      if([6,0].includes(new Date(y,mo-1,d).getDay()) && rnd()<0.8) push(date, -Math.round(1500+rnd()*4500), eats[Math.floor(rnd()*eats.length)], 'rakuten-card');
      if(rnd()<0.22) push(date, -Math.round(400+rnd()*1800), pp[Math.floor(rnd()*pp.length)], 'paypay');
      if(rnd()<0.18) push(date, -Math.round(150+rnd()*400), 'モバイルSuica チャージ利用','rakuten-card','transport');
      if(rnd()<0.08) push(date, -Math.round(500+rnd()*1500), 'ランチ(現金)','cash','eatout');

  }
  const existing=new Set(state.tx.map(txHash));
  for(const t of T){ if(!existing.has(t.hash)){ state.tx.push(t); existing.add(t.hash);} }
  state.tx.sort((a,b)=> b.date.localeCompare(a.date));
  const setBal=(id,v)=>{const a=state.accounts.find(x=>x.id===id); if(a && a.balance==null){a.balance=v;a.updatedAt=today;a.demo=true;}};
  setBal('rakuten-bank',842500); setBal('rakuten-sec',1263000); setBal('paypay',12400); setBal('cash',18000);
  state.settings.demoLoaded=true;
  save(); viewMonth=thisMonth(); go('home'); toast('サンプルデータを読み込みました');
}
function removeDemo(){
  state.tx = state.tx.filter(t=>!t.demo);
  for(const a of state.accounts){ if(a.demo){ a.balance=null; a.updatedAt=null; delete a.demo; } }
  state.settings.demoLoaded=false;
  save(); render(); toast('サンプルデータを削除しました');
}

/* ---------- init ---------- */
render();
armAutoSync();
</script>
